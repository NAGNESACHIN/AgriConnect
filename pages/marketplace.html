
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Marketplace</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f4fff4;
      color:#222;
    }

    nav{
      background:#2e7d32;
      color:white;
      padding:18px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav h2{
      display:flex;
      align-items:center;
      gap:10px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
    }

    .hero{
      text-align:center;
      padding:60px 20px;
      background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?q=80&w=1600&auto=format&fit=crop') center/cover;
      color:white;
    }

    .search-box{
      width:90%;
      max-width:500px;
      margin:30px auto;
      display:flex;
    }

    .search-box input{
      flex:1;
      padding:14px;
      border:none;
      outline:none;
      border-radius:10px 0 0 10px;
    }

    .search-box button{
      padding:14px 20px;
      border:none;
      background:#2e7d32;
      color:white;
      border-radius:0 10px 10px 0;
      cursor:pointer;
    }

    .products{
      width:90%;
      margin:auto;
      padding:50px 0;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .price{
      color:#2e7d32;
      font-weight:700;
      margin:10px 0;
    }

    .btn{
      display:inline-block;
      padding:10px 18px;
      background:#2e7d32;
      color:white;
      text-decoration:none;
      border-radius:8px;
    }

    footer{
      text-align:center;
      padding:25px;
      background:#122013;
      color:white;
    }
  </style>
</head>
<body>

  <nav>
    <h2><i class="fa-solid fa-seedling"></i> AgriConnect</h2>

    <div>
      <a href="../index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Fresh Farm Products</h1>
    <p>Buy directly from trusted farmers</p>

    <div class="search-box">
      <input type="text" placeholder="Search crops...">
      <button><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
  </section>

  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1592924357228-91a4daadcfea?q=80&w=1200&auto=format&fit=crop">

      <div class="card-content">
        <h3>Fresh Tomatoes</h3>
        <p>Organic farm tomatoes</p>
        <div class="price">₹40 / Kg</div>
        <a href="#" class="btn">Buy Now</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?q=80&w=800&auto=format&fit=crop">

      <div class="card-content">
        <h3>Potato</h3>
        <p>Premium quality potato</p>
        <div class="price">₹55 / Kg</div>
        <a href="#" class="btn">Buy Now</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c?q=80&w=800&auto=format&fit=crop">

      <div class="card-content">
        <h3>RICE</h3>
        <p>Fresh RICE directly from farms</p>
        <div class="price">₹30 / Kg</div>
        <a href="#" class="btn">Buy Now</a>
      </div>
    </div>

  </section>

  <footer>
    © 2026 AgriConnect Marketplace
  </footer>
<script>

  const productSection = document.querySelector('.products');

  let products = JSON.parse(localStorage.getItem('products')) || [];

  products.forEach((product,index) => {

    productSection.innerHTML += `

      <div class="card">

        <img src="${product.image}">

        <div class="card-content">

          <h3>${product.name}</h3>

          <p class="farmer">
            <i class="fa-solid fa-user"></i>
            Farmer: ${product.farmer}
          </p>

          <p>${product.desc}</p>

          <div class="price-row">

            <div class="price">
              ₹${product.price} / Kg
            </div>

            <button class="buy-btn" onclick="buyProduct(${index})">
              Buy Now
            </button>

          </div>

        </div>

      </div>

    `;
  });

</script>
<script>

function buyProduct(index){

  let products = JSON.parse(localStorage.getItem('products')) || [];

  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  cart.push(products[index]);

  localStorage.setItem('cart', JSON.stringify(cart));

  alert("Product Added To Cart 😄");

}

</script>
</body>
</html>
