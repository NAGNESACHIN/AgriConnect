<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buyer Dashboard | AgriConnect</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f4fff4;
      color:#222;
    }

    .dashboard{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100vh;
    }

    /* Sidebar */

    .sidebar{
      background:#122013;
      color:white;
      padding:30px 20px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:1.5rem;
      font-weight:700;
      margin-bottom:40px;
    }

    .logo img{
      height: 2em;
      width: auto;
      border-radius:10px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .menu a{
      text-decoration:none;
      color:white;
      padding:14px;
      border-radius:12px;
      transition:0.3s;
    }

    .menu a:hover{
      background:#2e7d32;
    }

    /* Main */

    .main{
      padding:30px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .profile{
      display:flex;
      align-items:center;
      gap:12px;
      background:white;
      padding:10px 18px;
      border-radius:14px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    /* Stats */

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:35px;
    }

    .stat-card{
      background:white;
      padding:25px;
      border-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .stat-card:hover{
      transform:translateY(-5px);
    }

    .stat-card i{
      font-size:2rem;
      color:#2e7d32;
      margin-bottom:15px;
    }

    .stat-card h2{
      color:#2e7d32;
      margin-bottom:5px;
    }

    /* Orders */

    .orders-section{
      margin-top:30px;
    }

    .orders-section h2{
      margin-bottom:20px;
    }

    .orders{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .order-card{
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .order-card:hover{
      transform:translateY(-8px);
    }

    .order-card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .order-content{
      padding:20px;
    }

    .price{
      color:#2e7d32;
      font-weight:700;
      margin:10px 0;
    }

    .status{
      display:inline-block;
      background:#d4edda;
      color:#155724;
      padding:6px 14px;
      border-radius:20px;
      font-size:0.9rem;
      margin-top:10px;
    }

    .empty{
      background:white;
      padding:40px;
      text-align:center;
      border-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    @media(max-width:900px){

      .dashboard{
        grid-template-columns:1fr;
      }

      .sidebar{
        display:none;
      }

    }

  </style>
</head>
<body>

  <div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

      <div class="logo">
        <img src="../assets/images/logo.png" width="45">
        AgriConnect
      </div>

      <div class="menu">
        <a href="#"><i class="fa-solid fa-chart-line"></i> Dashboard</a>

        <a href="marketplace.html">
          <i class="fa-solid fa-store"></i>
          Marketplace
        </a>

        <a href="#">
          <i class="fa-solid fa-cart-shopping"></i>
          My Orders
        </a>

        <a href="../index.html">
          <i class="fa-solid fa-house"></i>
          Home
        </a>
      </div>

    </div>

    <!-- Main -->

    <div class="main">

      <div class="topbar">

        <h1>Buyer Dashboard 🛒</h1>

        <div class="profile">
          <i class="fa-solid fa-user"></i>
          Buyer
        </div>

      </div>

      <!-- Stats -->

      <div class="stats">

        <div class="stat-card">
          <i class="fa-solid fa-cart-shopping"></i>
          <h2 id="totalOrders">0</h2>
          <p>Total Orders</p>
        </div>

        <div class="stat-card">
          <i class="fa-solid fa-indian-rupee-sign"></i>
          <h2 id="totalSpent">₹0</h2>
          <p>Total Spent</p>
        </div>

        <div class="stat-card">
          <i class="fa-solid fa-truck"></i>
          <h2>Fast Delivery</h2>
          <p>Within 24 Hours</p>
        </div>

      </div>

      <!-- Orders -->

      <div class="orders-section">

        <h2>Purchased Products</h2>

        <div class="orders" id="ordersContainer"></div>

      </div>

    </div>

  </div>

  <script>

    const ordersContainer = document.getElementById('ordersContainer');

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function renderOrders(){

      ordersContainer.innerHTML = '';

      if(cart.length === 0){

        ordersContainer.innerHTML = `
          <div class="empty">
            <h2>No Products Purchased Yet 😄</h2>
            <p>Go to marketplace and buy fresh crops.</p>
          </div>
        `;

        return;
      }

      let totalSpent = 0;

      cart.forEach(product=>{

        totalSpent += Number(product.price);

        ordersContainer.innerHTML += `

          <div class="order-card">

            <img src="${product.image}">

            <div class="order-content">

              <h3>${product.name}</h3>

              <p>${product.desc}</p>

              <div class="price">
                ₹${product.price} / Kg
              </div>

              <p>
                <b>Farmer:</b>
                ${product.farmer}
              </p>

              <div class="status">
                Ordered Successfully
              </div>

            </div>

          </div>

        `;
      });

      document.getElementById('totalOrders').innerText = cart.length;

      document.getElementById('totalSpent').innerText = `₹${totalSpent}`;

    }

    renderOrders();

  </script>

</body>
</html>
