<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyer Dashboard | AgriConnect</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body data-requires-auth="true">
  <div class="container">
    <header>
      <nav>
        <a href="../index.html" class="btn">Home</a>
        <div class="nav-links">
          <a href="marketplace.html">Marketplace</a>
          <a href="login.html" data-logout>Logout</a>
        </div>
      </nav>
    </header>

    <section class="hero">
      <h1>Buyer Dashboard</h1>
      <p>Welcome, <strong data-user-name></strong>.</p>
      <p>Manage your orders and discover new crops from local farmers.</p>

    <div class="grid-2">

        <h2>Recent orders</h2>

      </div>
      <div class="card">
        <h2>Recommendations</h2>
        <p>See fresh crop offers and nearby farms with stock available today.</p>
      </div>
    </div>
  </div>
  <script src="../assets/js/auth.js"></script>
