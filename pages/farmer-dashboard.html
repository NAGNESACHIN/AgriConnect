<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farmer Dashboard | AgriConnect</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f4fff4;
      color:#222;
    }

    .dashboard{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100vh;
    }

    /* Sidebar */
    .sidebar{
      background:#122013;
      color:white;
      padding:30px 20px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:1.5rem;
      font-weight:700;
      margin-bottom:40px;
    }

    .logo img{
      height: 8em;
      width: auto;
    }

    .logo i{
      color:#8bc34a;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .menu a{
      text-decoration:none;
      color:white;
      padding:14px;
      border-radius:12px;
      transition:0.3s;
    }

    .menu a:hover{
      background:#2e7d32;
    }

    /* Main */
    .main{
      padding:30px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .topbar h1{
      font-size:2rem;
    }

    .profile{
      display:flex;
      align-items:center;
      gap:12px;
      background:white;
      padding:10px 18px;
      border-radius:14px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    /* Stats */
    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:35px;
    }

    .stat-card{
      background:white;
      padding:25px;
      border-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .stat-card:hover{
      transform:translateY(-5px);
    }

    .stat-card i{
      font-size:2rem;
      color:#2e7d32;
      margin-bottom:15px;
    }

    .stat-card h2{
      color:#2e7d32;
      margin-bottom:5px;
    }

    /* Form */
    .upload-section{
      background:white;
      padding:30px;
      border-radius:24px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      margin-bottom:40px;
    }

    .upload-section h2{
      margin-bottom:25px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .input-group{
      display:flex;
      flex-direction:column;
    }

    .input-group label{
      margin-bottom:8px;
      font-weight:500;
    }

    .input-group input,
    .input-group textarea{
      padding:14px;
      border:2px solid #e5e5e5;
      border-radius:12px;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus,
    .input-group textarea:focus{
      border-color:#2e7d32;
    }

    textarea{
      resize:none;
      min-height:120px;
    }

    .preview{
      margin-top:15px;
    }

    .preview img{
      width:120px;
      height:120px;
      object-fit:cover;
      border-radius:14px;
      display:none;
    }

    .submit-btn{
      margin-top:25px;
      padding:14px 28px;
      border:none;
      border-radius:14px;
      background:#2e7d32;
      color:white;
      cursor:pointer;
      font-size:1rem;
      transition:0.3s;
    }

    .submit-btn:hover{
      transform:translateY(-3px);
    }

    /* Product List */
    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .product-card{
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-8px);
    }

    .product-card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .product-content{
      padding:20px;
    }

    .price{
      color:#2e7d32;
      font-weight:700;
      margin:10px 0;
    }

    .delete-btn{
      margin-top:12px;
      padding:10px 18px;
      border:none;
      border-radius:10px;
      background:#d32f2f;
      color:white;
      cursor:pointer;
    }

    @media(max-width:900px){
      .dashboard{
        grid-template-columns:1fr;
      }

      .sidebar{
        display:none;
      }
    }
  </style>
</head>
<body>

  <div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

      <div class="logo">
        <img src="../assets/images/logo.png" alt="AgriConnect Logo">
        AgriConnect
      </div>

      <div class="menu">
        <a href="#"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="#"><i class="fa-solid fa-leaf"></i> My Crops</a>
        <a href="#"><i class="fa-solid fa-cart-shopping"></i> Orders</a>
        <a href="../index.html"><i class="fa-solid fa-house"></i> Home</a>
      </div>

    </div>

    <!-- Main -->
    <div class="main">

      <div class="topbar">
        <h1>Farmer Dashboard 🚜</h1>

        <div class="profile">
          <i class="fa-solid fa-user"></i>
          Farmer
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">

        <div class="stat-card">
          <i class="fa-solid fa-sack-dollar"></i>
          <h2>₹12,500</h2>
          <p>Total Earnings</p>
        </div>

        <div class="stat-card">
          <i class="fa-solid fa-cart-shopping"></i>
          <h2>45</h2>
          <p>Total Orders</p>
        </div>

        <div class="stat-card">
          <i class="fa-solid fa-leaf"></i>
          <h2 id="productCount">0</h2>
          <p>Uploaded Crops</p>
        </div>

      </div>

      <!-- Upload -->
      <div class="upload-section">

        <h2>Upload New Crop</h2>

        <form id="cropForm">

          <div class="form-grid">

            <div class="input-group">
              <label>Crop Name</label>
              <input type="text" id="cropName" required>
            </div>

            <div class="input-group">
              <label>Price (₹ / Kg)</label>
              <input type="number" id="cropPrice" required>
            </div>

            <div class="input-group">
              <label>Farmer Name</label>
              <input type="text" id="farmerName" required>
            </div>

            <div class="input-group">
              <label>Upload Crop Photo</label>
              <input type="file" id="cropImage" accept="image/*" required>

              <div class="preview">
                <img id="previewImage">
              </div>
            </div>

          </div>

          <div class="input-group" style="margin-top:20px;">
            <label>Description</label>
            <textarea id="cropDesc"></textarea>
          </div>

          <button class="submit-btn" type="submit">
            <i class="fa-solid fa-upload"></i>
            Upload Crop
          </button>

        </form>

      </div>

      <!-- Products -->
      <h2 style="margin-bottom:20px;">My Uploaded Crops</h2>

      <div class="products" id="productContainer"></div>

    </div>

  </div>

  <script>

    const cropForm = document.getElementById('cropForm');
    const productContainer = document.getElementById('productContainer');
    const previewImage = document.getElementById('previewImage');
    const cropImage = document.getElementById('cropImage');
    const productCount = document.getElementById('productCount');

    let products = JSON.parse(localStorage.getItem('products')) || [];

    // Preview Image
    cropImage.addEventListener('change', function(){
      const file = this.files[0];

      if(file){
        const reader = new FileReader();

        reader.onload = function(e){
          previewImage.src = e.target.result;
          previewImage.style.display = 'block';
        }

        reader.readAsDataURL(file);
      }
    });

    // Render Products
    function renderProducts(){

      productContainer.innerHTML = '';

      products.forEach((product,index)=>{

        productContainer.innerHTML += `
          <div class="product-card">

            <img src="${product.image}">

            <div class="product-content">

              <h3>${product.name}</h3>

              <p>${product.desc}</p>

              <div class="price">₹${product.price} / Kg</div>

              <p><b>Farmer:</b> ${product.farmer}</p>

              <button class="delete-btn" onclick="deleteProduct(${index})">
                Delete
              </button>

            </div>

          </div>
        `;
      });

      productCount.innerText = products.length;

      localStorage.setItem('products', JSON.stringify(products));
    }

    // Submit Form
    cropForm.addEventListener('submit', function(e){

      e.preventDefault();

      const file = cropImage.files[0];

      const reader = new FileReader();

      reader.onload = function(event){

        const product = {
          name: document.getElementById('cropName').value,
          price: document.getElementById('cropPrice').value,
          farmer: document.getElementById('farmerName').value,
          desc: document.getElementById('cropDesc').value,
          image: event.target.result
        };

        products.push(product);

        renderProducts();

        cropForm.reset();

        previewImage.style.display = 'none';
      }

      reader.readAsDataURL(file);

    });

    // Delete Product
    function deleteProduct(index){
      products.splice(index,1);
      renderProducts();
    }

    renderProducts();

  </script>

</body>
</html>
